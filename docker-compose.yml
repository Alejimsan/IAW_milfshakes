version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: milfshakes_postgres
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi_milfshakes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: milfshakes_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Strapi CMS Microservice
  cms-strapi:
    build:
      context: ./microservices/cms-strapi
      dockerfile: Dockerfile
    container_name: milfshakes_cms
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi_milfshakes
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi
      NODE_ENV: development
      JWT_SECRET: your_jwt_secret_change_in_prod
      ADMIN_JWT_SECRET: your_admin_jwt_secret_change_in_prod
      API_TOKEN_SALT: your_api_token_salt_change_in_prod
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./microservices/cms-strapi:/app
      - /app/node_modules
    networks:
      - milfshakes_network

  # API Gateway
  api-gateway:
    build:
      context: ./microservices/api-gateway
      dockerfile: Dockerfile
    container_name: milfshakes_gateway
    environment:
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - catalog-service
      - auth-service
      - cart-service
      - cms-strapi
    networks:
      - milfshakes_network
    volumes:
      - ./microservices/api-gateway:/usr/src/app

  # Catalog Service
  catalog-service:
    build:
      context: ./microservices/catalog-service
      dockerfile: Dockerfile
    container_name: milfshakes_catalog
    environment:
      PORT: 3001
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      - redis
      - postgres
    networks:
      - milfshakes_network
    volumes:
      - ./microservices/catalog-service:/usr/src/app

  # Auth Service
  auth-service:
    build:
      context: ./microservices/auth-service
      dockerfile: Dockerfile
    container_name: milfshakes_auth
    environment:
      PORT: 3002
      NODE_ENV: development
      JWT_SECRET: your_jwt_secret_change_in_prod
      REDIS_URL: redis://redis:6379
    ports:
      - "3002:3002"
    depends_on:
      - redis
      - postgres
    networks:
      - milfshakes_network
    volumes:
      - ./microservices/auth-service:/usr/src/app

  # Cart Service
  cart-service:
    build:
      context: ./microservices/cart-service
      dockerfile: Dockerfile
    container_name: milfshakes_cart
    environment:
      PORT: 3003
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    ports:
      - "3003:3003"
    depends_on:
      - redis
    networks:
      - milfshakes_network
    volumes:
      - ./microservices/cart-service:/usr/src/app

  # Inventory Service
  inventory-service:
    build:
      context: ./microservices/inventory-service
      dockerfile: Dockerfile
    container_name: milfshakes_inventory
    environment:
      PORT: 3004
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    ports:
      - "3004:3004"
    depends_on:
      - redis
      - postgres
    networks:
      - milfshakes_network
    volumes:
      - ./microservices/inventory-service:/usr/src/app

  # Payments Service
  payments-service:
    build:
      context: ./microservices/payments-service
      dockerfile: Dockerfile
    container_name: milfshakes_payments
    environment:
      PORT: 3005
      NODE_ENV: development
      STRIPE_API_KEY: ${STRIPE_API_KEY:-sk_test_dummy}
    ports:
      - "3005:3005"
    networks:
      - milfshakes_network
    volumes:
      - ./microservices/payments-service:/usr/src/app

  # Notifications Service
  notifications-service:
    build:
      context: ./microservices/notifications-service
      dockerfile: Dockerfile
    container_name: milfshakes_notifications
    environment:
      PORT: 3006
      NODE_ENV: development
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
    ports:
      - "3006:3006"
    networks:
      - milfshakes_network
    volumes:
      - ./microservices/notifications-service:/usr/src/app

volumes:
  postgres_data:
    driver: local

networks:
  milfshakes_network:
    driver: bridge
